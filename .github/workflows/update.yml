name: actualizar-resumenes

on:
  schedule:
    - cron: '5,35 * * * *'   # cada 30 min (en el Mundial salen seguido y se entierran rápido)
  workflow_dispatch:         # botón para correrlo a mano

permissions:
  contents: write

concurrency:
  group: update-matches
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Scrapear resúmenes
        run: python scripts/build.py
      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matches.json
          if git diff --cached --quiet; then
            echo "sin cambios"
          else
            git commit -m "actualizar resúmenes [bot]"
            git push
          fi
